stages:
  data_visualization:
    cmd: python src/data_visualization.py # Apuntar aquí a tu script de visualización de datos
    deps:
      - src/data_visualization.py
      - data/raw/datos_creditos.csv
      - data/raw/datos_tarjetas.csv
    outs:
      - docs/output/01_distribucion_variable_objetivo.png
      - docs/output/02_creditos_distribucion_objetivo_credito.png
      - docs/output/02_creditos_distribucion_situacion_vivienda.png
      - docs/output/03_tarjetas_distribucion_estado_civil.png
      - docs/output/03_tarjetas_distribucion_estado_cliente.png
      - docs/output/03_tarjetas_distribucion_genero.png
      - docs/output/03_tarjetas_distribucion_nivel_educativo.png
      - docs/output/03_tarjetas_distribucion_nivel_tarjeta.png
      - docs/output/04_correlaciones_creditos.png
      - docs/output/05_correlaciones_tarjetas.png

  data_profile:
    cmd: python src/data_profile.py
    deps:
      - src/data_profile.py
      - data/raw/datos_creditos.csv
      - data/raw/datos_tarjetas.csv
    outs:
      - docs/output/reporte_verificacion_creditos.html
      - docs/output/reporte_verificacion_tarjetas.html

  data_quality_pandera:
    cmd: pytest --html=docs/output/reporte_calidad_datos_basico.html --self-contained-html test/test_data_quality.py -v || exit /b 0
    deps:
      - test/test_data_quality.py
      - data/raw/datos_creditos.csv
      - data/raw/datos_tarjetas.csv
    outs:
      - docs/output/reporte_calidad_datos_basico.html

  data_quality_ge:
    cmd: pytest --html=docs/output/reporte_calidad_datos_ge.html --self-contained-html test/test_data_quality_ge.py -v || exit /b 0
    deps:
      - test/test_data_quality_ge.py
      - data/raw/datos_creditos.csv
      - data/raw/datos_tarjetas.csv
    outs:
      - docs/output/reporte_calidad_datos_ge.html